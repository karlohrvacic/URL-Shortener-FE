<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0b"/>
      <stop offset="100%" stop-color="#18181b"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#a67c00" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a67c00" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="600" cy="315" r="350" fill="url(#glow)"/>
  <!-- Link icon -->
  <g transform="translate(600,220)" stroke="#a67c00" stroke-width="7" fill="none" stroke-linecap="round">
    <rect x="-70" y="-12" width="140" height="24" rx="12" transform="rotate(-25)"/>
    <rect x="-12" y="-70" width="24" height="140" rx="12" transform="rotate(25)" opacity="0.35"/>
  </g>
  <text x="600" y="330" text-anchor="middle" fill="#ffffff" font-family="Georgia, 'Times New Roman', serif" font-size="72" font-weight="bold">hrva.cc</text>
  <text x="600" y="385" text-anchor="middle" fill="#a67c00" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="28" letter-spacing="0.5">short links, shaped by you</text>
  <line x1="400" y1="425" x2="800" y2="425" stroke="#a67c00" stroke-opacity="0.3" stroke-width="1"/>
  <text x="600" y="480" text-anchor="middle" fill="#a1a1aa" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18">Free URL shortener with analytics, expiration control, and safe browsing</text>
  <text x="600" y="560" text-anchor="middle" fill="#52525b" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="13">https://hrva.cc</text>
